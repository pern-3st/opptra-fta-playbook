        - generic [ref=e1039]: Active
      - paragraph [ref=e1042]: "India-UAE CEPA was the first FTA signed by India in over a decade, entering into force in May 2022. It covers trade in goods, services, and investment. India is UAE's second-largest trading partner and the agreement targets bilateral trade of USD 100 billion within 5 years. Note: some sensitive sectors (steel, aluminum, plastic) have specific ROO requirements to prevent circumvention."
